format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$line_break\
$character"""

right_format = """$nodejs$python$rust$golang$java$php$lua$ruby$c$cpp$cmake$deno$bun$package$cmd_duration"""
add_newline = true

# [transient_prompt]
# enabled = true

[battery]
disabled = true

[sudo]
disabled = true

[package]
format = '[$symbol($version )]($style) '
symbol = "¾░Åù "

[nodejs]
format = "[$symbol($version) ]($style)"
symbol = "¯£İ "

[fill]
symbol = " "

[directory]
style = "blue"
# read_only = " ´á¢"
read_only = " ¾░î¥"
truncation_length = 4
truncate_to_repo = true

[character]
success_symbol = "[ÔØ»](green)"
error_symbol = "[ÔØ»](red)"
vicmd_symbol = "[ÔØ«](green)"

[git_branch]
symbol = "´Éİ "
format = "[$symbol$branch]($style) "
style = "bright-black"

[jobs]
symbol = "´Çô"
style = "bold red"
number_threshold = 1
format = "[$symbol]($style)"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "cyan"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_metrics]
disabled = true

[cmd_duration]
format = "[$duration]($style)"
style = "yellow"

[time]
disabled = true
style = "bold white"
format = "[$time]($style)"

